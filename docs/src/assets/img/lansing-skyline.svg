<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1F3A" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#0B1F3A" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="fog" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F6F4F1" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#F6F4F1" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#F6F4F1" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="600" fill="url(#g)"/>

  <!-- distant silhouette -->
  <g fill="#0B1F3A" opacity="0.40">
    <rect x="880" y="240" width="90" height="190" rx="2"/>
    <rect x="990" y="220" width="130" height="210" rx="2"/>
    <rect x="1140" y="250" width="110" height="180" rx="2"/>
    <rect x="1265" y="270" width="160" height="160" rx="2"/>
    <rect x="680" y="260" width="150" height="170" rx="2"/>
    <rect x="520" y="290" width="120" height="140" rx="2"/>
  </g>

  <!-- Capitol-inspired dome -->
  <g fill="#0B1F3A" opacity="0.55">
    <rect x="770" y="220" width="140" height="210" rx="2"/>
    <rect x="810" y="185" width="60" height="35" rx="2"/>
    <path d="M840 130
             C800 130 785 165 785 185
             L895 185
