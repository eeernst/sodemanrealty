  </g>

  <!-- foreground treeline -->
  <path d="M0 455
           C110 430 210 470 310 450
           C420 425 520 475 635 455
           C745 435 840 490 975 460
           C1110 430 1205 480 1340 455
           C1450 435 1530 470 1600 455
